<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
<title>Operation Iqra — Mission Card</title>
<style>
  @font-face{
    font-family:'RocaTwo'; font-weight:700; font-display:swap;
    src:url('./fonts/RocaTwo-Bold.ttf') format('truetype');
  }
  @font-face{
    font-family:'RocaTwo'; font-weight:300; font-display:swap;
    src:url('./fonts/RocaTwo-Thin.ttf') format('truetype');
  }
  :root{
    --bg:#717b5e; --bg2:#2E3326; --ink:#F9F9F6; --sage:#acb59a;
    --tan:#ab875f; --cream:#ffead1; --kraft:#4A3728;
  }
  *{box-sizing:border-box; margin:0; padding:0}
  body{
    min-height:100dvh; background:radial-gradient(120% 90% at 50% 0%, #7d876a 0%, var(--bg) 45%, var(--bg2) 100%);
    color:var(--ink); font-family:'Inter',system-ui,-apple-system,'Segoe UI',sans-serif;
    display:flex; align-items:center; justify-content:center; padding:24px; overflow-x:hidden;
  }
  .serif{font-family:'RocaTwo',Georgia,'Times New Roman',serif; font-weight:700; letter-spacing:.3px}
  .stage{width:100%; max-width:420px; display:flex; flex-direction:column; align-items:center; gap:22px}
  .topbar{width:100%; max-width:420px; display:flex; align-items:center; justify-content:space-between; gap:12px}
  .brandmark{font-size:12px; letter-spacing:3px; text-transform:uppercase; color:var(--sage); font-weight:600}
  .langsel{display:inline-flex; border:1px solid var(--sage); border-radius:999px; overflow:hidden; flex:none}
  .langsel button{font-family:inherit; font-size:11px; font-weight:700; letter-spacing:1px; padding:6px 12px;
    background:transparent; color:var(--sage); border:none; cursor:pointer}
  .langsel button[aria-pressed="true"]{background:var(--sage); color:#2a2f22}

  .btn{font-family:inherit; font-size:15px; font-weight:700; padding:15px 18px; border-radius:12px; border:none; cursor:pointer}
  .btn-primary{background:var(--tan); color:#2a1d12}
  .btn-primary:disabled{opacity:.45; cursor:default}
  .btn-ghost{background:transparent; color:var(--ink); border:1.5px solid var(--sage)}
  .errline{font-size:13px; color:#f0c9b0; min-height:1em; text-align:center}

  /* ---------- 0. LANDING ---------- */
  #landing{display:none; flex-direction:column; align-items:center; gap:16px; width:100%; margin-top:6px}
  .seal-badge{width:76px; height:76px; border-radius:50%; display:flex; align-items:center; justify-content:center;
    background:radial-gradient(circle at 40% 35%, #c0553f, #8f3322); color:var(--cream); font-size:34px;
    box-shadow:0 8px 20px rgba(0,0,0,.35); margin-bottom:2px}
  .landing-lead{font-size:14px; color:var(--sage); text-align:center; line-height:1.5; max-width:300px}
  #groupInput{width:100%; font-family:inherit; font-size:16px; color:var(--ink); text-align:center;
    background:rgba(255,255,255,.08); border:1.5px solid var(--sage); border-radius:12px; padding:14px 16px}
  #groupInput::placeholder{color:rgba(249,249,246,.5)}
  #groupInput:focus{outline:none; border-color:var(--cream)}
  #openBtn{width:100%}

  /* ---------- 1. SHUFFLE ---------- */
  #shuffle{position:relative; width:180px; height:220px; display:none; align-items:center; justify-content:center}
  .scard{position:absolute; width:104px; height:144px; border-radius:16px; box-shadow:0 10px 24px rgba(0,0,0,.28)}
  .scard:nth-child(1){background:var(--cream)}
  .scard:nth-child(2){background:var(--tan)}
  .scard:nth-child(3){background:var(--sage)}
  .scard:nth-child(4){background:var(--kraft)}
  .scard:nth-child(5){background:var(--cream)}
  @keyframes riffle{
    0%{transform:translate(0,0) rotate(0)}
    25%{transform:translate(-30px,-20px) rotate(-8deg)}
    50%{transform:translate(30px,10px) rotate(8deg)}
    75%{transform:translate(-10px,25px) rotate(-4deg)}
    100%{transform:translate(0,0) rotate(0)}
  }
  .scard{animation:riffle 1.4s ease-in-out infinite}
  .scard:nth-child(2){animation-delay:.14s}
  .scard:nth-child(3){animation-delay:.28s}
  .scard:nth-child(4){animation-delay:.42s}
  .scard:nth-child(5){animation-delay:.56s}
  .caption{display:none; font-size:13px; color:var(--sage); letter-spacing:1px; min-height:1.2em; text-align:center}

  /* ---------- 2. ENVELOPE ---------- */
  #envWrap{display:none; flex-direction:column; align-items:center; gap:16px}
  .envelope{
    position:relative; width:280px; height:186px; border-radius:10px; cursor:pointer;
    background:linear-gradient(160deg,#5a4433,var(--kraft)); box-shadow:0 18px 40px rgba(0,0,0,.35);
    transition:transform .25s ease; perspective:900px;
  }
  .envelope:hover{transform:translateY(-4px)}
  .env-pocket{position:absolute; inset:0; border-radius:10px; overflow:hidden}
  .env-pocket::before{
    content:""; position:absolute; inset:0;
    background:
      linear-gradient(45deg, transparent 49.6%, rgba(0,0,0,.18) 50%, transparent 50.4%),
      linear-gradient(-45deg, transparent 49.6%, rgba(0,0,0,.18) 50%, transparent 50.4%);
  }
  .wax{position:absolute; left:50%; top:56%; transform:translate(-50%,-50%); width:52px; height:52px;
    border-radius:50%; background:radial-gradient(circle at 40% 35%, #c0553f, #8f3322);
    display:flex; align-items:center; justify-content:center; color:var(--cream); font-size:22px;
    box-shadow:0 4px 10px rgba(0,0,0,.35); z-index:3}
  .env-flap{position:absolute; top:0; left:0; width:100%; height:60%;
    background:linear-gradient(160deg,#6b5137,#3d2e21); transform-origin:top center;
    clip-path:polygon(0 0,100% 0,50% 100%); transition:transform .6s cubic-bezier(.6,-0.2,.3,1.4); z-index:4}
  .envelope.open .env-flap{transform:rotateX(180deg)}
  .envelope.open .wax{opacity:0; transition:opacity .2s}
  .tap-label{font-size:15px; letter-spacing:1px; color:var(--cream); opacity:.9}
  .tap-label b{color:var(--ink)}
  .remain{font-size:12px; color:var(--sage); min-height:1em}

  /* ---------- 3. MISSION CARD + DOSSIER ---------- */
  #cardWrap{display:none; width:100%; flex-direction:column; align-items:center; gap:18px}
  .card-group{font-size:12px; letter-spacing:1px; color:var(--sage)}
  .card-group b{color:var(--ink)}

  /* group-number card (online mode) — same width, smaller height, sits above mission card */
  .groupnum-card{width:100%; display:none; background:var(--cream); color:var(--kraft); border-radius:14px;
    padding:14px 18px; box-shadow:0 12px 30px rgba(0,0,0,.3); text-align:center}
  .groupnum-card.on{display:block}
  .gnc-lead{font-size:10px; letter-spacing:2px; text-transform:uppercase; color:var(--tan); margin-bottom:4px}
  .gnc-num{font-size:22px; color:var(--kraft)}

  .paper{
    width:100%; background:var(--cream); color:var(--kraft); border-radius:18px; padding:26px 24px 28px;
    box-shadow:0 24px 60px rgba(0,0,0,.4); position:relative; overflow:hidden;
  }
  .mcard{animation:rise .55s cubic-bezier(.2,.7,.2,1) both}
  @keyframes rise{from{transform:translateY(40px) scale(.96); opacity:0}to{transform:none; opacity:1}}
  .paper::before{content:""; position:absolute; inset:0; border:2px dashed rgba(74,55,40,.25); border-radius:14px; margin:8px; pointer-events:none}
  .tag{font-size:11px; letter-spacing:2px; text-transform:uppercase; color:var(--tan); font-weight:700}
  .mtitle{font-size:24px; margin:6px 0 16px; color:var(--kraft)}
  .brief-label{font-size:10px; letter-spacing:2px; text-transform:uppercase; color:var(--tan); text-align:center; margin-bottom:4px}
  .arabic{font-size:30px; line-height:1.95; direction:rtl; text-align:center; margin:2px 0 8px; color:#3a2b1e}
  .translation{text-align:center; font-size:14px; line-height:1.5; color:#7a5c3f; margin-bottom:18px}
  .divider{height:1px; background:rgba(74,55,40,.18); margin:0 0 16px}
  .mission-label{font-size:10px; letter-spacing:2px; text-transform:uppercase; color:var(--tan); margin-bottom:6px}
  .prompt{font-size:15px; line-height:1.6; color:#4a3728}
  .ref{margin-top:16px; font-size:12px; color:var(--tan); font-weight:600; text-align:right}
  #writeReportBtn{width:100%}

  /* dossier */
  #dossier{display:none; width:100%; flex-direction:column; gap:18px}
  .dossier-title{font-size:16px; color:var(--kraft); margin-bottom:4px}
  .field{display:flex; flex-direction:column; gap:6px; margin-bottom:14px}
  .field:last-of-type{margin-bottom:4px}
  .field label{font-size:13px; font-weight:700; color:var(--kraft)}
  .field textarea{
    font-family:inherit; font-size:14px; color:#3a2b1e; line-height:1.5; resize:vertical; min-height:70px;
    background:#fff7ec; border:1.5px solid rgba(74,55,40,.3); border-radius:10px; padding:10px 12px;
  }
  .field textarea::placeholder{color:#a98a6b}
  .field textarea:focus{outline:none; border-color:var(--tan)}
  #submitReportBtn{width:100%; margin-top:2px}
  .submitted-msg{font-size:13px; color:var(--sage); text-align:center; min-height:1em}

  /* ---------- error ---------- */
  #errWrap{display:none; flex-direction:column; align-items:center; gap:14px; text-align:center}
  .err-title{font-size:18px; color:var(--ink)}
  .err-body{font-size:13px; color:var(--sage); max-width:300px; line-height:1.5}
  .btn-retry{background:var(--tan); color:#2a1d12; font-family:inherit; font-weight:600; font-size:14px;
    padding:12px 24px; border-radius:12px; border:none; cursor:pointer}

  @media (prefers-reduced-motion:reduce){
    .scard{animation:none}
    .scard:nth-child(2){transform:rotate(-8deg)}
    .scard:nth-child(3){transform:rotate(8deg)}
    .scard:nth-child(4){transform:rotate(-4deg)}
    .mcard{animation:none}
    .env-flap{transition:none}
  }
</style>
</head>
<body>
  <div class="stage">
    <div class="topbar">
      <div class="brandmark" id="brandmark">QSC × HIMMAH · Operation Iqra</div>
      <div class="langsel" role="group" aria-label="Language">
        <button id="langEn" aria-pressed="true">EN</button>
        <button id="langId" aria-pressed="false">ID</button>
      </div>
    </div>

    <!-- 0. landing -->
    <div id="landing">
      <div class="seal-badge serif">ق</div>
      <div class="landing-lead" id="landingLead"></div>
      <input id="groupInput" type="text" maxlength="50" autocomplete="off"
             enterkeyhint="go" aria-label="Group name" />
      <button class="btn btn-primary" id="openBtn" disabled></button>
      <div class="errline" id="landingErr"></div>
    </div>

    <!-- 1. shuffle -->
    <div id="shuffle">
      <div class="scard"></div><div class="scard"></div><div class="scard"></div>
      <div class="scard"></div><div class="scard"></div>
    </div>
    <div class="caption" id="caption">Shuffling mission files…</div>

    <!-- 2. envelope -->
    <div id="envWrap">
      <div class="envelope" id="envelope" role="button" tabindex="0" aria-label="Open mission envelope">
        <div class="env-pocket"></div>
        <div class="wax serif">ق</div>
        <div class="env-flap"></div>
      </div>
      <div class="tap-label" id="tapLabel">Tap to <b>open</b></div>
      <div class="remain" id="remain"></div>
    </div>

    <!-- 3. mission card + dossier -->
    <div id="cardWrap">
      <div class="card-group" id="cardGroup"></div>

      <div class="groupnum-card" id="groupNumCard">
        <div class="gnc-lead" id="gncLead"></div>
        <div class="gnc-num serif" id="gncNum"></div>
      </div>

      <div class="paper mcard">
        <div class="tag" id="mTag">Mission 01</div>
        <h1 class="mtitle serif" id="mTitle"></h1>
        <div class="brief-label" id="briefLabel">Your ayat</div>
        <div class="arabic serif" id="mArabic"></div>
        <div class="translation" id="mTranslation"></div>
        <div class="divider"></div>
        <div class="mission-label" id="missionLabel">Mission</div>
        <p class="prompt" id="mPrompt"></p>
        <div class="ref" id="mRef"></div>
      </div>

      <button class="btn btn-ghost" id="writeReportBtn"></button>

      <div id="dossier">
        <div class="paper">
          <div class="dossier-title serif" id="dossierTitle"></div>
          <div id="reportFields"></div>
        </div>
        <button class="btn btn-primary" id="submitReportBtn"></button>
        <div class="submitted-msg" id="submittedMsg"></div>
      </div>
    </div>

    <!-- error -->
    <div id="errWrap">
      <div class="err-title serif" id="errTitle">Connection issue</div>
      <div class="err-body" id="errBody"></div>
      <button class="btn-retry" id="btnRetry">Retry</button>
    </div>
  </div>

<script type="module">
  import { I18N } from './lib/strings.js';

  const $ = (id) => document.getElementById(id);
  const SHUFFLE_MS = 1600;
  const clientDate = () => new Date().toISOString().slice(0, 10);

  // ----- event context -----
  const slug = (new URLSearchParams(location.search).get('event') || 'operation-iqra').trim();
  const CLAIM_KEY = `himmah_claim_${slug}`;
  const PLAYER_KEY = `himmah_pid_${slug}`;
  const LANG_KEY = 'himmah_lang';

  let event = null;         // the GameEvent config
  let online = false;       // player_per_group > 1
  let lang = localStorage.getItem(LANG_KEY) === 'id' ? 'id' : 'en';
  let group = '';           // offline: the name; online: unused label
  let groupKey = '';        // report key: name (offline) or group number (online)
  let groupNumber = null;   // online only
  let lastDrawn = null;     // mission card index
  let lastRemaining = null; // offline envelopes left; null when reusing / online
  let submitted = false;

  const getClaim = () => { try { return JSON.parse(localStorage.getItem(CLAIM_KEY)); } catch { return null; } };
  const setClaim = (c) => localStorage.setItem(CLAIM_KEY, JSON.stringify(c));
  function playerId(){
    let p = localStorage.getItem(PLAYER_KEY);
    if (!p){ p = (crypto.randomUUID ? crypto.randomUUID() : String(Math.random()).slice(2) + Date.now()); localStorage.setItem(PLAYER_KEY, p); }
    return p;
  }

  // ----- views -----
  const views = ['landing','shuffle','caption','envWrap','cardWrap','errWrap'];
  const displayFor = (v) => (v === 'caption' ? 'block' : 'flex');
  function show(...ids){
    for (const v of views) $(v).style.display = ids.includes(v) ? displayFor(v) : 'none';
  }

  // ----- i18n -----
  function t(){ return I18N[lang]; }
  function escapeHtml(s){ return String(s).replace(/[&<>"']/g, (c) => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c])); }

  function applyLang(){
    const x = t();
    document.documentElement.lang = lang;
    $('brandmark').textContent = (event && event.title) ? event.title : x.brand;
    $('landingLead').textContent = online ? x.joinLead : x.landingLead;
    $('groupInput').placeholder = x.groupPlaceholder;
    $('openBtn').textContent = online ? x.joinBtn : x.openBtn;
    $('caption').textContent = x.shuffling;
    $('tapLabel').innerHTML = x.tap;
    $('envelope').setAttribute('aria-label', x.envAria);
    $('briefLabel').textContent = x.briefLabel;
    $('missionLabel').textContent = x.missionLabel;
    $('writeReportBtn').textContent = x.writeReport;
    $('dossierTitle').textContent = x.dossierTitle;
    $('submitReportBtn').textContent = x.submitReport;
    $('errTitle').textContent = x.errTitle;
    $('errBody').textContent = x.errBody;
    $('btnRetry').textContent = x.retry;
    $('langEn').setAttribute('aria-pressed', lang === 'en');
    $('langId').setAttribute('aria-pressed', lang === 'id');
    $('gncLead').textContent = x.groupCardLead;
    updateGroupCard();
    updateRemain();
    applyReportLang();
    if (submitted) $('submittedMsg').textContent = x.submitted;
    if ($('cardWrap').style.display === 'flex' && lastDrawn !== null) renderCard();
  }

  function updateGroupCard(){
    if (online && groupNumber != null){
      $('groupNumCard').classList.add('on');
      $('gncNum').textContent = `${t().groupWord} ${groupNumber} · ${t().roomWord} ${groupNumber}`;
      $('cardGroup').style.display = 'none';
    } else {
      $('groupNumCard').classList.remove('on');
      $('cardGroup').style.display = 'block';
      if (group) $('cardGroup').innerHTML = '<b>' + escapeHtml(group) + '</b>';
    }
  }

  function updateRemain(){
    if (online){ $('remain').textContent = t().reused; return; }
    const total = event ? event.max_group_per_mission_card * event.missionCards.length : 0;
    $('remain').textContent = (lastRemaining === null) ? t().reused : t().remain(lastRemaining, total);
  }

  function renderCard(){
    const c = event.missionCards[lastDrawn];
    if (!c) return;
    const ms = c.mission_statement[lang] || c.mission_statement.en;
    $('mTag').textContent = c.mission_slug;
    $('mTitle').textContent = ms.title;
    $('mArabic').textContent = c.ayat.arabic;
    $('mTranslation').textContent = c.ayat.translation[lang] || c.ayat.translation.en;
    $('mPrompt').textContent = ms.prompt;
    $('mRef').textContent = c.ayat.ref;
  }

  function setLang(l){ lang = l; localStorage.setItem(LANG_KEY, l); applyLang(); }

  // ----- dynamic report form -----
  function buildReportForm(){
    const box = $('reportFields');
    box.innerHTML = '';
    (event.report_summary || []).forEach((f, i) => {
      const field = document.createElement('div');
      field.className = 'field';
      const label = document.createElement('label');
      label.setAttribute('for', `fReport${i}`);
      label.textContent = f.label;
      const ta = document.createElement('textarea');
      ta.id = `fReport${i}`;
      field.appendChild(label);
      field.appendChild(ta);
      box.appendChild(field);
    });
  }
  function applyReportLang(){
    if (!event) return;
    (event.report_summary || []).forEach((f, i) => {
      const ta = $(`fReport${i}`);
      if (ta) ta.placeholder = (f.hints && f.hints[lang]) || (f.hints && f.hints.en) || '';
    });
  }

  // ----- landing / draw -----
  function refreshOpenBtn(){
    if (online) { $('openBtn').disabled = false; return; }
    $('openBtn').disabled = $('groupInput').value.trim().length === 0;
  }

  async function openMissionCard(){
    $('landingErr').textContent = '';
    let body;
    if (online){
      body = { slug, playerId: playerId() };
    } else {
      const name = $('groupInput').value.trim();
      if (!name){ $('landingErr').textContent = t().nameRequired; return; }
      body = { slug, name };
    }
    $('openBtn').disabled = true;
    let data;
    try {
      const res = await fetch('/api/draw', {
        method:'POST', headers:{ 'Content-Type':'application/json' },
        body: JSON.stringify(body),
      });
      if (res.status === 409 && !online){ $('landingErr').textContent = t().nameInUse; $('openBtn').disabled = false; return; }
      if (!res.ok) throw new Error('draw ' + res.status);
      data = await res.json();
    } catch (e){
      show('errWrap');
      return;
    }
    lastDrawn = data.mission;
    if (online){
      groupNumber = data.group;
      groupKey = String(data.group);
      group = '';
      lastRemaining = null;
    } else {
      group = $('groupInput').value.trim();
      groupKey = group;
      lastRemaining = data.remaining;
    }
    setClaim({ group, groupKey, groupNumber, mission: lastDrawn, date: clientDate() });
    updateGroupCard();
    runShuffle();
  }

  function runShuffle(){
    show('shuffle','caption');
    $('envelope').classList.remove('open');
    setTimeout(() => { updateRemain(); show('envWrap'); }, SHUFFLE_MS);
  }

  function openEnvelope(){
    if ($('cardWrap').style.display === 'flex') return;
    renderCard();
    updateGroupCard();
    $('envelope').classList.add('open');
    setTimeout(() => { show('cardWrap'); }, 620);
  }

  // ----- report -----
  function showDossier(){
    $('writeReportBtn').style.display = 'none';
    $('dossier').style.display = 'flex';
    const first = $('fReport0');
    if (first) first.focus();
  }
  async function submitReport(){
    if (submitted) return;
    const btn = $('submitReportBtn');
    btn.disabled = true;
    $('submittedMsg').textContent = '';
    const fields = (event.report_summary || []).map((f, i) => ($(`fReport${i}`) ? $(`fReport${i}`).value : ''));
    try {
      const res = await fetch('/api/report', {
        method:'POST', headers:{ 'Content-Type':'application/json' },
        body: JSON.stringify({ slug, groupKey, fields }),
      });
      if (!res.ok) throw new Error('report ' + res.status);
      submitted = true;
      (event.report_summary || []).forEach((f, i) => { const ta = $(`fReport${i}`); if (ta) ta.disabled = true; });
      $('submittedMsg').textContent = t().submitted;
    } catch (e){
      $('submittedMsg').textContent = t().submitError;
      btn.disabled = false;
    }
  }

  // ----- boot -----
  function startFromClaim(claim){
    group = claim.group || '';
    groupKey = claim.groupKey || group;
    groupNumber = claim.groupNumber != null ? claim.groupNumber : null;
    lastDrawn = claim.mission;
    lastRemaining = null;
    updateGroupCard();
    show('shuffle','caption');
    $('envelope').classList.remove('open');
    setTimeout(() => { updateRemain(); show('envWrap'); }, SHUFFLE_MS);
  }

  async function boot(){
    // load the event config
    try {
      const res = await fetch('/api/event?slug=' + encodeURIComponent(slug));
      if (res.status === 404){ showNoEvent(); return; }
      if (!res.ok) throw new Error('event ' + res.status);
      const data = await res.json();
      event = data.event;
      online = event.player_per_group > 1;
    } catch (e){
      show('errWrap');
      return;
    }
    buildReportForm();
    applyLang();

    const claim = getClaim();
    if (claim && claim.mission != null && claim.date === clientDate()){
      startFromClaim(claim);
    } else {
      // online mode has no text input; hide it
      $('groupInput').style.display = online ? 'none' : 'block';
      show('landing');
      refreshOpenBtn();
    }
  }

  function showNoEvent(){
    $('errTitle').textContent = t().noEventTitle;
    $('errBody').textContent = t().noEventBody;
    $('btnRetry').style.display = 'none';
    show('errWrap');
  }

  // ----- wire up -----
  $('langEn').addEventListener('click', () => setLang('en'));
  $('langId').addEventListener('click', () => setLang('id'));
  $('groupInput').addEventListener('input', refreshOpenBtn);
  $('groupInput').addEventListener('keydown', (e) => { if (e.key === 'Enter' && !$('openBtn').disabled) openMissionCard(); });
  $('openBtn').addEventListener('click', openMissionCard);
  $('envelope').addEventListener('click', openEnvelope);
  $('envelope').addEventListener('keydown', (e) => { if (e.key === 'Enter' || e.key === ' '){ e.preventDefault(); openEnvelope(); } });
  $('writeReportBtn').addEventListener('click', showDossier);
  $('submitReportBtn').addEventListener('click', submitReport);
  $('btnRetry').addEventListener('click', () => { $('btnRetry').style.display = ''; boot(); });

  boot();
</script>
</body>
</html>
