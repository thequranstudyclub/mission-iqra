<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
<title>Operation Iqra — Mission Card</title>
<style>
  @font-face{
    font-family:'RocaTwo'; font-weight:700; font-display:swap;
    src:url('./fonts/RocaTwo-Bold.ttf') format('truetype');
  }
  @font-face{
    font-family:'RocaTwo'; font-weight:300; font-display:swap;
    src:url('./fonts/RocaTwo-Thin.ttf') format('truetype');
  }
  :root{
    --bg:#717b5e; --bg2:#2E3326; --ink:#F9F9F6; --sage:#acb59a;
    --tan:#ab875f; --cream:#ffead1; --kraft:#4A3728;
  }
  *{box-sizing:border-box; margin:0; padding:0}
  body{
    min-height:100dvh; background:radial-gradient(120% 90% at 50% 0%, #7d876a 0%, var(--bg) 45%, var(--bg2) 100%);
    color:var(--ink); font-family:'Inter',system-ui,-apple-system,'Segoe UI',sans-serif;
    display:flex; align-items:center; justify-content:center; padding:24px; overflow-x:hidden;
  }
  .serif{font-family:'RocaTwo',Georgia,'Times New Roman',serif; font-weight:700; letter-spacing:.3px}
  .stage{width:100%; max-width:420px; display:flex; flex-direction:column; align-items:center; gap:22px}
  .topbar{width:100%; max-width:420px; display:flex; align-items:center; justify-content:space-between; gap:12px}
  .brandmark{font-size:12px; letter-spacing:3px; text-transform:uppercase; color:var(--sage); font-weight:600}
  .langsel{display:inline-flex; border:1px solid var(--sage); border-radius:999px; overflow:hidden; flex:none}
  .langsel button{font-family:inherit; font-size:11px; font-weight:700; letter-spacing:1px; padding:6px 12px;
    background:transparent; color:var(--sage); border:none; cursor:pointer}
  .langsel button[aria-pressed="true"]{background:var(--sage); color:#2a2f22}

  /* ---------- 1. SHUFFLE ---------- */
  #shuffle{position:relative; width:180px; height:220px; display:flex; align-items:center; justify-content:center}
  .scard{position:absolute; width:104px; height:144px; border-radius:16px; box-shadow:0 10px 24px rgba(0,0,0,.28)}
  .scard:nth-child(1){background:var(--cream)}
  .scard:nth-child(2){background:var(--tan)}
  .scard:nth-child(3){background:var(--sage)}
  .scard:nth-child(4){background:var(--kraft)}
  .scard:nth-child(5){background:var(--cream)}
  @keyframes riffle{
    0%{transform:translate(0,0) rotate(0)}
    25%{transform:translate(-30px,-20px) rotate(-8deg)}
    50%{transform:translate(30px,10px) rotate(8deg)}
    75%{transform:translate(-10px,25px) rotate(-4deg)}
    100%{transform:translate(0,0) rotate(0)}
  }
  .scard{animation:riffle 1.4s ease-in-out infinite}
  .scard:nth-child(2){animation-delay:.14s}
  .scard:nth-child(3){animation-delay:.28s}
  .scard:nth-child(4){animation-delay:.42s}
  .scard:nth-child(5){animation-delay:.56s}
  .caption{font-size:13px; color:var(--sage); letter-spacing:1px; min-height:1.2em; text-align:center}

  /* ---------- 2. ENVELOPE ---------- */
  #envWrap{display:none; flex-direction:column; align-items:center; gap:16px}
  .envelope{
    position:relative; width:280px; height:186px; border-radius:10px; cursor:pointer;
    background:linear-gradient(160deg,#5a4433,var(--kraft)); box-shadow:0 18px 40px rgba(0,0,0,.35);
    transition:transform .25s ease; perspective:900px;
  }
  .envelope:hover{transform:translateY(-4px)}
  .env-pocket{position:absolute; inset:0; border-radius:10px; overflow:hidden}
  .env-pocket::before{
    content:""; position:absolute; inset:0;
    background:
      linear-gradient(45deg, transparent 49.6%, rgba(0,0,0,.18) 50%, transparent 50.4%),
      linear-gradient(-45deg, transparent 49.6%, rgba(0,0,0,.18) 50%, transparent 50.4%);
  }
  .wax{position:absolute; left:50%; top:56%; transform:translate(-50%,-50%); width:52px; height:52px;
    border-radius:50%; background:radial-gradient(circle at 40% 35%, #c0553f, #8f3322);
    display:flex; align-items:center; justify-content:center; color:var(--cream); font-size:22px;
    box-shadow:0 4px 10px rgba(0,0,0,.35); z-index:3}
  .env-flap{position:absolute; top:0; left:0; width:100%; height:60%;
    background:linear-gradient(160deg,#6b5137,#3d2e21); transform-origin:top center;
    clip-path:polygon(0 0,100% 0,50% 100%); transition:transform .6s cubic-bezier(.6,-0.2,.3,1.4); z-index:4}
  .envelope.open .env-flap{transform:rotateX(180deg)}
  .envelope.open .wax{opacity:0; transition:opacity .2s}
  .tap-label{font-size:15px; letter-spacing:1px; color:var(--cream); opacity:.9}
  .tap-label b{color:var(--ink)}
  .remain{font-size:12px; color:var(--sage); min-height:1em}

  /* ---------- 3. MISSION CARD ---------- */
  #cardWrap{display:none; width:100%; flex-direction:column; align-items:center; gap:18px}
  .mcard{
    width:100%; background:var(--cream); color:var(--kraft); border-radius:18px; padding:26px 24px 28px;
    box-shadow:0 24px 60px rgba(0,0,0,.4); position:relative; overflow:hidden;
    animation:rise .55s cubic-bezier(.2,.7,.2,1) both;
  }
  @keyframes rise{from{transform:translateY(40px) scale(.96); opacity:0}to{transform:none; opacity:1}}
  .mcard::before{content:""; position:absolute; inset:0; border:2px dashed rgba(74,55,40,.25); border-radius:14px; margin:8px; pointer-events:none}
  .tag{font-size:11px; letter-spacing:2px; text-transform:uppercase; color:var(--tan); font-weight:700}
  .mtitle{font-size:24px; margin:6px 0 16px; color:var(--kraft)}
  .brief-label{font-size:10px; letter-spacing:2px; text-transform:uppercase; color:var(--tan); text-align:center; margin-bottom:4px}
  .arabic{font-size:30px; line-height:1.95; direction:rtl; text-align:center; margin:2px 0 8px; color:#3a2b1e}
  .translation{text-align:center; font-size:14px; line-height:1.5; color:#7a5c3f; margin-bottom:18px}
  .divider{height:1px; background:rgba(74,55,40,.18); margin:0 0 16px}
  .mission-label{font-size:10px; letter-spacing:2px; text-transform:uppercase; color:var(--tan); margin-bottom:6px}
  .prompt{font-size:15px; line-height:1.6; color:#4a3728}
  .ref{margin-top:16px; font-size:12px; color:var(--tan); font-weight:600; text-align:right}
  .actions{display:flex; gap:12px; width:100%}
  button.act{flex:1; font-family:inherit; font-size:14px; font-weight:600; padding:14px; border-radius:12px; border:none; cursor:pointer}
  .btn-return{background:transparent; color:var(--ink); border:1.5px solid var(--sage)}
  .btn-return:disabled{opacity:.5; cursor:default}
  .returned{font-size:13px; color:var(--sage); text-align:center; min-height:1em}

  /* ---------- error ---------- */
  #errWrap{display:none; flex-direction:column; align-items:center; gap:14px; text-align:center}
  .err-title{font-size:18px; color:var(--ink)}
  .err-body{font-size:13px; color:var(--sage); max-width:300px; line-height:1.5}
  .btn-retry{background:var(--tan); color:#2a1d12; font-family:inherit; font-weight:600; font-size:14px;
    padding:12px 24px; border-radius:12px; border:none; cursor:pointer}

  @media (prefers-reduced-motion:reduce){
    .scard{animation:none}
    .scard:nth-child(2){transform:rotate(-8deg)}
    .scard:nth-child(3){transform:rotate(8deg)}
    .scard:nth-child(4){transform:rotate(-4deg)}
    .mcard{animation:none}
    .env-flap{transition:none}
  }
</style>
</head>
<body>
  <div class="stage">
    <div class="topbar">
      <div class="brandmark" id="brandmark">QSC × HIMMAH · Operation Iqra</div>
      <div class="langsel" role="group" aria-label="Language">
        <button id="langEn" aria-pressed="true">EN</button>
        <button id="langId" aria-pressed="false">ID</button>
      </div>
    </div>

    <!-- 1. shuffle -->
    <div id="shuffle">
      <div class="scard"></div><div class="scard"></div><div class="scard"></div>
      <div class="scard"></div><div class="scard"></div>
    </div>
    <div class="caption" id="caption">Shuffling mission files…</div>

    <!-- 2. envelope -->
    <div id="envWrap">
      <div class="envelope" id="envelope" role="button" tabindex="0" aria-label="Open mission envelope">
        <div class="env-pocket"></div>
        <div class="wax serif">ق</div>
        <div class="env-flap"></div>
      </div>
      <div class="tap-label" id="tapLabel">Tap to <b>open</b></div>
      <div class="remain" id="remain"></div>
    </div>

    <!-- 3. mission card -->
    <div id="cardWrap">
      <div class="mcard">
        <div class="tag" id="mTag">Mission 01</div>
        <h1 class="mtitle serif" id="mTitle"></h1>
        <div class="brief-label" id="briefLabel">Your ayat</div>
        <div class="arabic serif" id="mArabic"></div>
        <div class="translation" id="mTranslation"></div>
        <div class="divider"></div>
        <div class="mission-label" id="missionLabel">Mission</div>
        <p class="prompt" id="mPrompt"></p>
        <div class="ref" id="mRef"></div>
      </div>
      <div class="actions">
        <button class="act btn-return" id="btnReturn">Return envelope</button>
      </div>
      <div class="returned" id="returnedMsg"></div>
    </div>

    <!-- error -->
    <div id="errWrap">
      <div class="err-title serif" id="errTitle">Connection issue</div>
      <div class="err-body" id="errBody"></div>
      <button class="btn-retry" id="btnRetry">Retry</button>
    </div>
  </div>

<script type="module">
  import { I18N, MISSIONS } from './lib/strings.js';

  const $ = (id) => document.getElementById(id);
  const CLAIM_KEY = 'himmah_claim';
  const LANG_KEY = 'himmah_lang';
  const SHUFFLE_MS = 1600;

  let lang = localStorage.getItem(LANG_KEY) === 'id' ? 'id' : 'en';
  let lastDrawn = null;
  let claimId = null;
  let lastRemaining = null;   // null when reusing a stored claim (unknown/stale)
  let returned = false;

  const getClaim = () => { try { return JSON.parse(localStorage.getItem(CLAIM_KEY)); } catch { return null; } };
  const setClaim = (c) => localStorage.setItem(CLAIM_KEY, JSON.stringify(c));
  const clearClaim = () => localStorage.removeItem(CLAIM_KEY);

  // ----- views -----
  const views = ['shuffle','caption','envWrap','cardWrap','errWrap'];
  function show(...ids){
    for (const v of views){
      const el = $(v);
      el.style.display = ids.includes(v)
        ? (v === 'shuffle' || v === 'caption' ? (v === 'shuffle' ? 'flex' : 'block') : 'flex')
        : 'none';
    }
  }

  // ----- i18n render -----
  function applyLang(){
    const t = I18N[lang];
    document.documentElement.lang = lang;
    $('brandmark').textContent = t.brand;
    $('caption').textContent = t.shuffling;
    $('tapLabel').innerHTML = t.tap;
    $('envelope').setAttribute('aria-label', t.envAria);
    $('briefLabel').textContent = t.briefLabel;
    $('missionLabel').textContent = t.missionLabel;
    $('btnReturn').textContent = t.ret;
    $('errTitle').textContent = t.errTitle;
    $('errBody').textContent = t.errBody;
    $('btnRetry').textContent = t.retry;
    $('langEn').setAttribute('aria-pressed', lang === 'en');
    $('langId').setAttribute('aria-pressed', lang === 'id');
    updateRemain();
    if ($('cardWrap').style.display === 'flex' && lastDrawn !== null) renderCard();
    if (returned) $('returnedMsg').textContent = I18N[lang].returned;
  }
  function updateRemain(){
    $('remain').textContent = (lastRemaining === null) ? I18N[lang].reused : I18N[lang].remain(lastRemaining);
  }
  function renderCard(){
    const m = MISSIONS[lastDrawn], L = m[lang];
    $('mTag').textContent = m.tag;
    $('mTitle').textContent = L.title;
    $('mArabic').textContent = m.arabic;
    $('mTranslation').textContent = L.translation;
    $('mPrompt').textContent = L.prompt;
    $('mRef').textContent = m.ref;
  }
  function setLang(l){ lang = l; localStorage.setItem(LANG_KEY, l); applyLang(); }

  // ----- flow -----
  async function draw(){
    const res = await fetch('/api/draw', { method:'POST' });
    if (!res.ok) throw new Error('draw ' + res.status);
    return res.json();  // { claimId, mission, remaining }
  }

  async function begin(){
    show('shuffle','caption');
    $('envelope').classList.remove('open');
    returned = false;
    $('returnedMsg').textContent = '';

    const wait = new Promise((r) => setTimeout(r, SHUFFLE_MS));
    const claim = getClaim();
    try {
      if (claim && claim.id != null && claim.mission != null){
        // reload on same device: reuse, draw nothing
        lastDrawn = claim.mission; claimId = claim.id; lastRemaining = null;
      } else {
        const d = await draw();
        lastDrawn = d.mission; claimId = d.claimId; lastRemaining = d.remaining;
        setClaim({ id: claimId, mission: lastDrawn });
      }
      await wait;
      revealEnvelope();
    } catch (e){
      await wait;
      show('errWrap');
    }
  }

  function revealEnvelope(){
    updateRemain();
    show('envWrap');
    $('btnReturn').disabled = false;
  }

  function openEnvelope(){
    if ($('cardWrap').style.display === 'flex') return;
    renderCard();
    $('envelope').classList.add('open');
    setTimeout(() => { show('cardWrap'); }, 620);
  }

  async function returnEnvelope(){
    if (returned || !claimId) return;
    $('btnReturn').disabled = true;
    try {
      const res = await fetch('/api/return', {
        method:'POST', headers:{ 'Content-Type':'application/json' },
        body: JSON.stringify({ claimId }),
      });
      if (!res.ok) throw new Error('return ' + res.status);
      returned = true;
      clearClaim();
      $('returnedMsg').textContent = I18N[lang].returned;
    } catch (e){
      $('btnReturn').disabled = false;
    }
  }

  // ----- wire up -----
  $('langEn').addEventListener('click', () => setLang('en'));
  $('langId').addEventListener('click', () => setLang('id'));
  $('envelope').addEventListener('click', openEnvelope);
  $('envelope').addEventListener('keydown', (e) => { if (e.key === 'Enter' || e.key === ' '){ e.preventDefault(); openEnvelope(); } });
  $('btnReturn').addEventListener('click', returnEnvelope);
  $('btnRetry').addEventListener('click', begin);

  applyLang();
  begin();
</script>
</body>
</html>
